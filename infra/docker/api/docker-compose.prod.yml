services:
  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    container_name: pulselane-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${API_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s