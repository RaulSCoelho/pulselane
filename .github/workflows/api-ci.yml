name: API CI

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/api-ci.yml"
      - "apps/api/Dockerfile"
      - ".dockerignore"
  pull_request:
    paths:
      - "apps/api/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/api-ci.yml"
      - "apps/api/Dockerfile"
      - ".dockerignore"

jobs:
  api-ci:
    name: API CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/pulselane_ci?schema=public
      PORT: "3001"
      NODE_ENV: test
      ALLOWED_CORS_ORIGINS: http://localhost:3000

      LOG_LEVEL: info
      SLOW_REQUEST_THRESHOLD_MS: "1000"
      METRICS_BEARER_TOKEN: test-metrics-bearer-token-with-at-least-32-characters
      SENTRY_ENABLED: "false"
      SENTRY_DSN: dummy-dsn-for-tests
      SENTRY_ENVIRONMENT: test
      SENTRY_RELEASE: test
      SENTRY_TRACES_SAMPLE_RATE: "0"

      COOKIE_SECRET: test-cookie-secret
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      COOKIE_DOMAIN: ""

      JWT_ACCESS_SECRET: test-access-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      ACCESS_TOKEN_TTL_SECONDS: "900"
      REFRESH_TOKEN_TTL_DAYS: "30"

      APP_WEB_URL: http://localhost:3000

      EMAIL_FROM_NAME: Pulselane
      EMAIL_FROM_ADDRESS: no-reply@pulselane.com
      EMAIL_TRANSPORT: logger

      STRIPE_ENABLED: "false"
      STRIPE_SECRET_KEY: dummy-stripe-secret
      STRIPE_WEBHOOK_SECRET: dummy-stripe-webhook-secret
      STRIPE_PRICE_STARTER: dummy-price-starter
      STRIPE_PRICE_GROWTH: dummy-price-growth

      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "true"
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --dir apps/api db:generate

      - name: Lint API
        run: pnpm --dir apps/api lint:check

      - name: Typecheck API
        run: pnpm --dir apps/api typecheck

      - name: Build API
        run: pnpm --dir apps/api build

      - name: Test API
        run: pnpm --dir apps/api test