name: Web CI

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/web-ci.yml"

jobs:
  web-ci:
    name: Web CI
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web
        run: pnpm --dir apps/web lint:check

      - name: Typecheck web
        run: pnpm typecheck:web

      - name: Build web
        run: pnpm build:web

      - name: Run web resilience tests
        run: pnpm --dir apps/web test:resilience

      - name: Notify Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        if: always()
        with:
          name: Vercel - pulselane: web-ci