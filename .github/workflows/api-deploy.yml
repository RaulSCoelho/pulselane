name: API Deploy

on:
  workflow_run:
    workflows:
      - API CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: api-deploy-production
  cancel-in-progress: false

jobs:
  deploy-api:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve deploy ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "checkout_ref=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
            echo "image_tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          else
            echo "checkout_ref=${{ github.event.workflow_run.head_sha }}" >> "${GITHUB_OUTPUT}"
            echo "image_tag=${{ github.event.workflow_run.head_sha }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.checkout_ref }}

      - name: Set image name
        id: image
        shell: bash
        run: |
          OWNER_LOWER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${OWNER_LOWER}/pulselane-api" >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.ref.outputs.image_tag }}
            ${{ steps.image.outputs.name }}:latest
          provenance: false

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deploy host to known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare remote deploy directory
        shell: bash
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p '${{ secrets.DEPLOY_PATH }}'"

      - name: Upload deploy assets
        shell: bash
        run: |
          scp infra/docker/api/docker-compose.prod.yml "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/docker-compose.prod.yml"
          scp infra/scripts/deploy-api.sh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/deploy-api.sh"

      - name: Deploy API on server
        shell: bash
        env:
          API_IMAGE: ${{ steps.image.outputs.name }}:${{ steps.ref.outputs.image_tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "\
            chmod +x '${{ secrets.DEPLOY_PATH }}/deploy-api.sh' && \
            echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin && \
            API_IMAGE='${API_IMAGE}' '${{ secrets.DEPLOY_PATH }}/deploy-api.sh' '${{ secrets.DEPLOY_PATH }}' \
          "